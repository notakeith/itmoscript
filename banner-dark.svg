<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&amp;family=JetBrains+Mono:wght@300;400;700&amp;display=swap');
      .title { font-family: 'Fraunces', Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <!-- INPUT: source code fragment -->
  <g class="mono" font-size="12">
    <text x="56" y="64" fill="#ffffff" fill-opacity="0.4">fib = <tspan fill="#7dd3fc" fill-opacity="0.75">function</tspan>(n)</text>
    <text x="56" y="84" fill="#ffffff" fill-opacity="0.4">  <tspan fill="#a5b4fc" fill-opacity="0.75">if</tspan> n == 0 <tspan fill="#a5b4fc" fill-opacity="0.75">then</tspan></text>
    <text x="56" y="104" fill="#ffffff" fill-opacity="0.4">    <tspan fill="#a5b4fc" fill-opacity="0.75">return</tspan> 0</text>
    <text x="56" y="124" fill="#ffffff" fill-opacity="0.4">  <tspan fill="#a5b4fc" fill-opacity="0.75">end if</tspan></text>
  </g>

  <!-- transition arrow with pipeline label -->
  <g stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.2" fill="none" stroke-linecap="round">
    <line x1="248" y1="92" x2="280" y2="92"/>
    <path d="M274 87 L280 92 L274 97"/>
  </g>
  <text x="248" y="112" class="mono" font-size="8" fill="#ffffff" fill-opacity="0.32" letter-spacing="1.5">LEX·PARSE·EVAL</text>

  <!-- OUTPUT: wordmark, solid -->
  <text x="300" y="106" class="title" font-size="58" font-weight="600" letter-spacing="-1.5" fill="#ffffff">ITMOScript</text>

  <!-- blinking cursor -->
  <rect x="676" y="66" width="11" height="46" fill="#7dd3fc" fill-opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.85;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <text x="302" y="136" class="mono" font-size="11" font-weight="300" letter-spacing="3.5" fill="#ffffff" fill-opacity="0.4">A TREE-WALKING INTERPRETER IN C++17</text>
</svg>

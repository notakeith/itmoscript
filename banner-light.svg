<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&amp;family=JetBrains+Mono:wght@300;400;700&amp;display=swap');
      .title { font-family: 'Fraunces', Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <g class="mono" font-size="12">
    <text x="56" y="64" fill="#000000" fill-opacity="0.42">fib = <tspan fill="#0369a1" fill-opacity="0.85">function</tspan>(n)</text>
    <text x="56" y="84" fill="#000000" fill-opacity="0.42">  <tspan fill="#4f46e5" fill-opacity="0.85">if</tspan> n == 0 <tspan fill="#4f46e5" fill-opacity="0.85">then</tspan></text>
    <text x="56" y="104" fill="#000000" fill-opacity="0.42">    <tspan fill="#4f46e5" fill-opacity="0.85">return</tspan> 0</text>
    <text x="56" y="124" fill="#000000" fill-opacity="0.42">  <tspan fill="#4f46e5" fill-opacity="0.85">end if</tspan></text>
  </g>

  <g stroke="#000000" stroke-opacity="0.32" stroke-width="1.2" fill="none" stroke-linecap="round">
    <line x1="248" y1="92" x2="280" y2="92"/>
    <path d="M274 87 L280 92 L274 97"/>
  </g>
  <text x="248" y="112" class="mono" font-size="8" fill="#000000" fill-opacity="0.35" letter-spacing="1.5">LEX·PARSE·EVAL</text>

  <text x="300" y="106" class="title" font-size="58" font-weight="600" letter-spacing="-1.5" fill="#111111">ITMOScript</text>

  <rect x="676" y="66" width="11" height="46" fill="#0284c7" fill-opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.9;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <text x="302" y="136" class="mono" font-size="11" font-weight="300" letter-spacing="3.5" fill="#000000" fill-opacity="0.45">A TREE-WALKING INTERPRETER IN C++17</text>
</svg>
